name: Daily Auto Schedule

on:
  schedule:
    - cron: '0 17 * * *'   # 00:00 VN
  workflow_dispatch:

jobs:
  run-job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install requests

      - name: Run script
        run: python etl.py