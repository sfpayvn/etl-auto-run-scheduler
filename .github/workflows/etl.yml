name: Daily Auto Schedule

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  run-job:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 👈 thêm dòng này

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install requests

      - run: python etl.py
